services:
  - type: web
    name: voxvidia-bridge
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: PERSONAPLEX_WS_URL
        sync: false
      - key: DEFAULT_VOICE
        value: NATF2.pt
      - key: DEFAULT_PROMPT
        value: "You enjoy having a good conversation."
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
