services:
  - type: web
    name: voxvidia-bridge
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RIME_API_KEY
        sync: false
      - key: RIME_VOICE
        value: cove
      - key: AGENT_NAME
        value: Maria
      - key: COMPANY_NAME
        value: Orlando Motors
      - key: DEFAULT_VOICE
        value: cove
      - key: DEFAULT_PROMPT
        value: default
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: USE_STUB_ADAPTERS
        value: "true"
      - key: VOXVIDIA_API_SECRET
        sync: false
